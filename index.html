<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surat Rahasia 💌</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Comic Sans MS", "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top left, #fff0f6, transparent 35%),
    radial-gradient(circle at bottom right, #ffe3ec, transparent 35%),
    linear-gradient(135deg, #ffd6e8, #fff3b0);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container {
  width: 92%;
  max-width: 430px;
  text-align: center;
  position: relative;
  z-index: 2;
}

.card {
  background: #ffffff;
  border: 4px dashed #ff85b3;
  border-radius: 28px;
  padding: 25px;
  box-shadow: 0 18px 0 #ffb3c6, 0 25px 40px rgba(255, 105, 180, 0.35);
  animation: bounceIn 1s ease;
}

.sticker {
  font-size: 45px;
  animation: wiggle 1.5s infinite;
}

.photo-wrap {
  width: 190px;
  height: 190px;
  margin: 15px auto;
  border-radius: 35px;
  padding: 8px;
  background: repeating-linear-gradient(
    45deg,
    #ff85b3,
    #ff85b3 10px,
    #ffd6e8 10px,
    #ffd6e8 20px
  );
  transform: rotate(-3deg);
}

.photo-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 27px;
  border: 5px solid white;
}

h1 {
  color: #ff4f9a;
  font-size: 30px;
  margin: 10px 0;
}

.text-box {
  background: #fff0f6;
  border-radius: 20px;
  padding: 15px;
  color: #5c3d46;
  font-size: 17px;
  line-height: 1.6;
  min-height: 95px;
}

button {
  margin-top: 15px;
  border: none;
  border-radius: 999px;
  padding: 13px 20px;
  font-size: 15px;
  cursor: pointer;
  font-weight: bold;
}

.yes {
  background: #ff4f9a;
  color: white;
  box-shadow: 0 7px 0 #d63384;
}

.no {
  background: #ffe066;
  color: #6b4e00;
  box-shadow: 0 7px 0 #f2b705;
  position: relative;
}

.result {
  display: none;
  margin-top: 18px;
  font-size: 20px;
  color: #ff1493;
  font-weight: bold;
}

.bubble {
  position: absolute;
  font-size: 24px;
  animation: floatUp 5s linear infinite;
  opacity: 0.8;
}

@keyframes bounceIn {
  0% {
    transform: scale(0.5) rotate(-8deg);
    opacity: 0;
  }
  70% {
    transform: scale(1.08) rotate(3deg);
    opacity: 1;
  }
  100% {
    transform: scale(1) rotate(0);
  }
}

@keyframes wiggle {
  0%, 100% { transform: rotate(-8deg); }
  50% { transform: rotate(8deg); }
}

@keyframes floatUp {
  from {
    transform: translateY(110vh) rotate(0deg);
  }
  to {
    transform: translateY(-20vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="sticker">🐻💌</div>

    <h1>Surat Rahasia!</h1>

    <div class="photo-wrap">
      <img src="mbg.jpeg" alt="Foto dia">
    </div>

    <div class="text-box" id="message">
      Halo kamu yang lucu 😳<br>
      Aku punya sesuatu nih...
    </div>

    <button class="yes" onclick="nextText()">Buka Surat 💖</button>
    <button class="no" onmouseover="runAway()" onclick="runAway()" id="noBtn">
      Jangan dibuka 😝
    </button>

    <div class="result" id="result">
      Ternyata isinya: aku sayang kamu banyak-banyak 😘💗
    </div>
  </div>
</div>

<script>
const texts = [
  "Halo kamu yang lucu 😳<br>Aku punya sesuatu nih...",
  "Jangan kaget ya... ini bukan tugas sekolah 😆",
  "Ini cuma halaman kecil buat orang yang besar artinya buat aku 💕",
  "Kalau kamu senyum sekarang, berarti aku menang 😝",
  "Kesimpulannya: kamu gemesin banget, titik. 💖"
];

let index = 0;

function nextText() {
  index++;

  if (index < texts.length) {
    document.getElementById("message").innerHTML = texts[index];
  } else {
    document.getElementById("result").style.display = "block";
  }
}

function runAway() {
  const btn = document.getElementById("noBtn");
  const x = Math.random() * 120 - 60;
  const y = Math.random() * 80 - 40;

  btn.style.transform = `translate(${x}px, ${y}px)`;
}

function createBubble() {
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = ["💖", "💕", "🌸", "✨", "🐻", "💌"][Math.floor(Math.random() * 6)];
  bubble.style.left = Math.random() * 100 + "vw";
  bubble.style.animationDuration = (4 + Math.random() * 4) + "s";

  document.body.appendChild(bubble);

  setTimeout(() => {
    bubble.remove();
  }, 8000);
}

setInterval(createBubble, 450);
</script>

</body>
</html>
