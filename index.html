<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open This 💖</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.card {
  width: 90%;
  max-width: 430px;
  background: rgba(255,255,255,0.92);
  padding: 28px;
  border-radius: 30px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(255, 20, 147, 0.35);
  z-index: 2;
  animation: pop 1s ease;
}

.photo {
  width: 210px;
  height: 210px;
  margin: auto;
  border-radius: 50%;
  padding: 7px;
  background: linear-gradient(45deg, #ff1493, #ffb6c1, #ff69b4);
  animation: glow 2s infinite alternate;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  display: block;
}

h1 {
  color: #ff1493;
  margin-bottom: 10px;
}

#typing {
  min-height: 90px;
  color: #444;
  font-size: 18px;
  line-height: 1.6;
}

button {
  border: none;
  border-radius: 30px;
  padding: 13px 22px;
  background: #ff1493;
  color: white;
  font-size: 15px;
  cursor: pointer;
  margin: 6px;
  box-shadow: 0 10px 25px rgba(255,20,147,0.35);
}

button:hover {
  transform: scale(1.08);
}

.secret {
  display: none;
  margin-top: 15px;
  color: #ff1493;
  font-weight: bold;
  font-size: 20px;
}

.heart {
  position: absolute;
  top: -50px;
  font-size: 24px;
  animation: fall linear infinite;
  opacity: 0.85;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

@keyframes pop {
  from {
    transform: scale(0.7);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

@keyframes glow {
  from {
    box-shadow: 0 0 12px #ff69b4;
  }
  to {
    box-shadow: 0 0 35px #ff1493;
  }
}
</style>
</head>

<body>

<div class="card">
  <div class="photo">
    <img src="mbg.jpeg" alt="Foto kamu">
  </div>

  <h1>Hai Kamu 💖</h1>

  <p id="typing"></p>

  <button onclick="nextMessage()">Baca Lagi 💌</button>
  <button onclick="showSecret()">Kejutan 😳</button>

  <div id="secret" class="secret">
    Kamu itu bukan cuma cantik,<br>
    kamu juga alasan aku senyum hari ini ❤️
  </div>
</div>

<script>
const messages = [
  "Aku bikin halaman ini khusus buat kamu...",
  "Karena ada hal yang susah aku bilang langsung.",
  "Aku cuma mau kamu tahu...",
  "Kamu itu spesial banget buat aku.",
  "Dan kalau kamu senyum setelah lihat ini...",
  "berarti misiku berhasil 💖"
];

let messageIndex = 0;
let charIndex = 0;

function typeText() {
  const typing = document.getElementById("typing");
  typing.innerHTML = "";

  charIndex = 0;
  const text = messages[messageIndex];

  function write() {
    if (charIndex < text.length) {
      typing.innerHTML += text.charAt(charIndex);
      charIndex++;
      setTimeout(write, 45);
    }
  }

  write();
}

function nextMessage() {
  messageIndex++;
  if (messageIndex >= messages.length) {
    messageIndex = 0;
  }
  typeText();
}

function showSecret() {
  document.getElementById("secret").style.display = "block";
}

typeText();

function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = ["💖","💕","💘","💗","💞","❤️"][Math.floor(Math.random() * 6)];
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 4) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 7000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
